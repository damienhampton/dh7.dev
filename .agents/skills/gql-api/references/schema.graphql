type Mutation {
  """Publish a new post to a publication. Requires authentication."""
  publishPost(input: PublishPostInput!): PublishPostPayload!

  """Update an existing post. Requires authentication."""
  updatePost(input: UpdatePostInput!): UpdatePostPayload!

  """
  Create a new draft on a publication without publishing it. Requires authentication.
  """
  createDraft(input: CreateDraftInput!): CreateDraftPayload!

  """Update an existing draft. Requires authentication."""
  updateDraft(input: UpdateDraftInput!): UpdateDraftPayload!

  """
  Publish an existing draft as a post. The draft is soft-deleted once the
  post is created. Requires authentication.
  """
  publishDraft(input: PublishDraftInput!): PublishDraftPayload!

  """
  Submit a draft on a team publication for editor review. Sets the
  pendingPublicationApproval flag so editors see the draft in their queue.
  Requires authentication.
  """
  submitDraftForReview(input: SubmitDraftForReviewInput!): SubmitDraftForReviewPayload!

  """
  Reject a draft that was previously submitted for review. Only publication
  owners, admins, and authors can reject. Requires authentication.
  """
  rejectDraftSubmission(input: RejectDraftSubmissionInput!): RejectDraftSubmissionPayload!

  """
  Soft-delete a draft (sets it inactive). The draft's author can delete their
  own draft; publication owners, admins, and authors can delete any draft in
  the publication. Requires authentication.
  """
  deleteDraft(input: DeleteDraftInput!): DeleteDraftPayload!

  """
  Returns a presigned URL for uploading an image to Hashnode's CDN. Requires authentication.
  """
  createImageUploadURL(input: CreateImageUploadInput!): CreateImageUploadPayload!
}

input PublishPostInput {
  """The publication ID to publish to."""
  publicationId: ObjectId!

  """Post title (required)."""
  title: String!

  """Post subtitle (optional)."""
  subtitle: String

  """Post content in markdown format (required)."""
  contentMarkdown: String!

  """Cover image URL."""
  coverImage: String

  """Custom slug. If not provided, generated from title."""
  slug: String

  """Tags as slugs (max 15). New tags will be created automatically."""
  tags: [PublishPostTagInput!]

  """Canonical URL for republished articles."""
  originalArticleURL: String

  """SEO title override."""
  metaTitle: String

  """SEO description override."""
  metaDescription: String

  """Custom OG image URL."""
  ogImage: String

  """Disable comments on this post."""
  disableComments: Boolean

  """Whether to delist the post from feeds (still accessible via URL)."""
  isDelisted: Boolean

  """Whether the resulting post should expose a table of contents."""
  enableToc: Boolean

  """
  Publish on behalf of another user who is a member of the publication. Only for team publications.
  """
  publishAs: ObjectId

  """IDs of co-authors (max 4). Must be members of the publication."""
  coAuthors: [ObjectId!]

  """Add the post to a series by ID."""
  seriesId: ObjectId

  """Backdate the post to a specific date."""
  publishedAt: DateTime
}

input PublishPostTagInput {
  """Tag slug (required). Used to find or create the tag."""
  slug: String!

  """Tag name. Defaults to slug if not provided."""
  name: String
}

