type Query {
  """Returns the current authenticated user. Requires authentication."""
  me: MyUser

  """Returns a post by ID"""
  post(id: ID!): Post

  """Returns a publication by ID or host"""
  publication(id: ObjectId, host: String): Publication

  """Returns a user by username"""
  user(username: String!): User

  """Returns a tag by slug"""
  tag(slug: String!): Tag

  """Returns a paginated feed of posts"""
  feed(first: Int!, after: String, filter: FeedFilter): FeedPostConnection!

  """Returns a draft by ID (requires authentication)"""
  draft(id: ObjectId!): Draft

  """Returns a scheduled post (requires authentication)"""
  scheduledPost(id: ObjectId!): ScheduledPost

  """Check if a custom domain is available"""
  checkCustomDomainAvailability(input: CheckCustomDomainAvailabilityInput!): CheckCustomDomainAvailabilityResult!

  """Check if a subdomain is available"""
  checkSubdomainAvailability(subdomain: String!): CheckSubdomainAvailabilityResult!

  """Search posts within a publication"""
  searchPostsOfPublication(first: Int!, after: String, sortBy: PostSortBy, filter: SearchPostsOfPublicationFilter!): SearchPostConnection!

  """Get top commenters"""
  topCommenters(publicationId: ObjectId!, limit: Int): [User!]!

  """Get documentation project by ID or host"""
  documentationProject(id: ID, host: String): DocumentationProject
}

